name: Build nextcloud-ocr

on:
  push:
    branches: [main]
  schedule:
    - cron: '30 3 * * *'   # täglich 03:30 UTC prüfen
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/nextcloud-ocr

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write        # zum Committen der State-Datei
    steps:
      - uses: actions/checkout@v4

      # ---- Zustand ermitteln: Base-Image-Digest + Paketversionen ----
      - name: Aktuellen Upstream-Zustand ermitteln
        id: state
        run: |
          DIGEST=$(docker buildx imagetools inspect nextcloud:apache \
            --format '{{println .Manifest.Digest}}' | head -n1)

          PKGS=$(docker run --rm nextcloud:apache bash -c \
            'apt-get update -qq >/dev/null 2>&1 && \
             apt-cache policy ocrmypdf tesseract-ocr-deu tesseract-ocr-eng | \
             grep -E "^(ocrmypdf|tesseract)|Candidate"')

          HASH=$(printf '%s\n%s' "$DIGEST" "$PKGS" | sha256sum | cut -d' ' -f1)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

          printf 'Digest: %s\n%s\n' "$DIGEST" "$PKGS"

      - name: Mit letztem Build vergleichen
        id: compare
        run: |
          LAST=$(cat .build-state 2>/dev/null || echo "none")
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Build erzwungen (Push/manuell)"
          elif [ "$LAST" != "${{ steps.state.outputs.hash }}" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Upstream-Änderung erkannt -> Build"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Keine Änderung -> kein Build"
          fi

      # ---- Nur bei Änderung bauen & pushen ----
      - name: Login GHCR
        if: steps.compare.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        if: steps.compare.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          pull: true
          push: true
          tags: ${{ env.IMAGE }}:latest

      - name: Neuen Zustand committen
        if: steps.compare.outputs.changed == 'true'
        run: |
          echo "${{ steps.state.outputs.hash }}" > .build-state
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .build-state
          git diff --cached --quiet || git commit -m "build: $(date -u +%F) [skip ci]"
          git push
